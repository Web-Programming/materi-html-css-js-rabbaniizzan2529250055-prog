<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soal 3</title>
    <script src="jsbani.js"></script>
</head>
<body>
    <h2>Kalkulator Sederhana</h2>

    <input type="number" id="angka1" placeholder="Angka 1">
    <input type="number" id="angka2" placeholder="Angka 2">
    <button onclick="hitung()">Hitung</button>

    <p id="hasil"></p>

    <script>
        function hitung() {
            var a = parseFloat(document.getElementById("angka1").value);
            var b = parseFloat(document.getElementById("angka2").value);

            var hasil = a + b;

            document.getElementById("hasil").innerHTML =
                "Hasil: " + hasil;
        }
    </script>
</body>
</html>
